name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install pytest
      # The suite compares us against objdump on the runner's own binaries.
      - run: python -m pytest -q
      - name: must agree with objdump on a real binary
        run: python -m x86disasm verify /usr/bin/objdump
